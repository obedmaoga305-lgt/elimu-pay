<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ElimuPay — Video Library</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#16a34a;--green-light:#22c55e;
  --red:#dc2626;--gold:#d97706;
  --bg:#080c0a;--bg2:#0f1710;--card:#111c14;
  --border:rgba(22,163,74,0.18);--text:#f0fdf4;
  --muted:#6b7280;--input-bg:rgba(255,255,255,0.04);
  --shadow:0 20px 50px rgba(0,0,0,0.5);
}
[data-theme="light"]{
  --bg:#f0fdf4;--bg2:#dcfce7;--card:#ffffff;
  --border:rgba(22,163,74,0.2);--text:#052e16;
  --muted:#4b5563;--input-bg:rgba(0,0,0,0.03);
  --shadow:0 20px 50px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;transition:background 0.3s,color 0.3s;
}

/* NAVBAR */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 2rem;
  background:rgba(8,12,10,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  gap:1rem;
}
[data-theme="light"] nav{background:rgba(240,253,244,0.9);}
.logo{
  font-family:'Sora',sans-serif;font-weight:800;font-size:1.2rem;
  color:var(--green-light);display:flex;align-items:center;gap:0.5rem;
  flex-shrink:0;letter-spacing:-0.5px;
}
.logo-icon{
  width:28px;height:28px;background:linear-gradient(135deg,var(--green),var(--green-light));
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;
}

/* Timer */
.timer-pill{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.45rem 1rem;border-radius:100px;
  border:2px solid var(--green);
  background:rgba(22,163,74,0.08);
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.9rem;
  color:var(--green-light);
  transition:all 0.5s;cursor:default;
}
.timer-pill.warning{
  border-color:var(--gold);
  background:rgba(217,119,6,0.1);
  color:var(--gold);
  animation:timerPulse 1s ease infinite;
}
.timer-pill.critical{
  border-color:var(--red);
  background:rgba(220,38,38,0.1);
  color:#f87171;
  animation:timerPulse 0.5s ease infinite;
}
@keyframes timerPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.timer-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

.nav-right{display:flex;align-items:center;gap:0.75rem;}
.user-chip{
  display:flex;align-items:center;gap:0.4rem;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:20px;padding:0.35rem 0.85rem;font-size:0.82rem;
  white-space:nowrap;
}
.theme-btn{
  background:var(--input-bg);border:1px solid var(--border);color:var(--text);
  width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;
}
.theme-btn:hover{background:var(--green);}
.logout-btn{
  background:none;border:1px solid rgba(220,38,38,0.3);color:#f87171;
  padding:0.35rem 0.85rem;border-radius:20px;font-size:0.82rem;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;font-family:'DM Sans',sans-serif;
}
.logout-btn:hover{background:rgba(220,38,38,0.1);}

/* EXTEND SESSION BANNER */
.extend-banner{
  display:none;
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;
  background:linear-gradient(135deg,#92400e,#d97706);
  border-radius:16px;padding:1.2rem 1.5rem;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  max-width:320px;animation:slideUp 0.4s ease;
}
.extend-banner.show{display:block;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.extend-banner h4{
  font-family:'Sora',sans-serif;font-weight:700;margin-bottom:0.4rem;color:#fff;
}
.extend-banner p{font-size:0.85rem;color:rgba(255,255,255,0.8);margin-bottom:1rem;}
.extend-banner-btns{display:flex;gap:0.75rem;}
.btn-extend{
  flex:1;padding:0.6rem;border:none;border-radius:10px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;
  transition:all 0.2s;
}
.btn-extend.primary{background:#fff;color:#92400e;}
.btn-extend.primary:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(0,0,0,0.2);}
.btn-extend.secondary{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);}

/* ─── MAIN ─── */
main{padding:5rem 1.5rem 3rem;}
.container{max-width:1200px;margin:0 auto;}

/* Header */
.page-header{padding:1.5rem 0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.page-header h1{
  font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;
}
.page-header h1 span{color:var(--green-light);}
.video-count{
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:10px;padding:0.4rem 1rem;
  font-size:0.85rem;color:var(--muted);
}

/* Search + Filters */
.controls{
  display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;align-items:center;
}
.search-wrap{
  position:relative;flex:1;min-width:220px;
}
.search-wrap span{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:1rem;pointer-events:none;
}
.search-input{
  width:100%;padding:0.75rem 1rem 0.75rem 2.8rem;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,0.12);}
.filter-select{
  padding:0.75rem 1rem;background:var(--card);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:0.88rem;outline:none;cursor:pointer;
  transition:border-color 0.2s;
}
.filter-select:focus{border-color:var(--green);}

/* Subject tabs */
.subject-tabs{
  display:flex;gap:0.6rem;flex-wrap:wrap;margin-bottom:1.5rem;
}
.subject-tab{
  padding:0.45rem 1.1rem;border-radius:100px;
  background:var(--input-bg);border:1px solid var(--border);
  color:var(--muted);font-size:0.85rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.subject-tab.active{background:var(--green);border-color:var(--green);color:#fff;}
.subject-tab:hover:not(.active){border-color:var(--green);color:var(--green-light);}

/* Video Grid */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.5rem;
}

/* Video Card */
.video-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;overflow:hidden;
  transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;
  cursor:pointer;animation:cardIn 0.4s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:none;}}
.video-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow);
  border-color:rgba(22,163,74,0.35);
}
.thumbnail{
  position:relative;width:100%;aspect-ratio:16/9;
  background:linear-gradient(135deg,var(--bg2),var(--card));
  overflow:hidden;
}
.thumbnail img{width:100%;height:100%;object-fit:cover;}
.thumb-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;
  background:linear-gradient(135deg,rgba(22,163,74,0.12),rgba(34,197,94,0.05));
}
.play-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.25s;
}
.video-card:hover .play-overlay{opacity:1;}
.play-btn{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;transform:scale(0.9);
  transition:transform 0.2s;padding-left:3px;
}
.video-card:hover .play-btn{transform:scale(1);}
.duration-badge{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,0.8);color:#fff;
  font-size:0.72rem;font-weight:600;padding:2px 7px;border-radius:6px;
  font-family:'Sora',sans-serif;
}
.subject-badge{
  position:absolute;top:8px;left:8px;
  padding:3px 10px;border-radius:100px;font-size:0.7rem;font-weight:700;
  letter-spacing:0.3px;
}
.card-body{padding:1.1rem;}
.card-title{
  font-family:'Sora',sans-serif;font-weight:700;
  font-size:0.95rem;line-height:1.4;margin-bottom:0.5rem;
}
.card-meta{
  display:flex;align-items:center;gap:0.75rem;
  font-size:0.78rem;color:var(--muted);
}
.card-desc{
  font-size:0.82rem;color:var(--muted);line-height:1.5;
  margin-top:0.5rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.views-count{display:flex;align-items:center;gap:0.3rem;}

/* Subject colors */
.badge-math{background:rgba(59,130,246,0.2);color:#93c5fd;}
.badge-science{background:rgba(16,185,129,0.2);color:#6ee7b7;}
.badge-english{background:rgba(245,158,11,0.2);color:#fcd34d;}
.badge-history{background:rgba(239,68,68,0.2);color:#fca5a5;}
.badge-kiswahili{background:rgba(168,85,247,0.2);color:#d8b4fe;}
.badge-default{background:rgba(107,114,128,0.2);color:#9ca3af;}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--card) 25%,var(--input-bg) 50%,var(--card) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;border-radius:18px;height:280px;
}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

.empty-state{
  grid-column:1/-1;text-align:center;padding:4rem 2rem;
}
.empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty-state h3{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:0.5rem;}
.empty-state p{color:var(--muted);font-size:0.9rem;}

/* ─── VIDEO MODAL ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  align-items:center;justify-content:center;padding:1rem;
}
.modal-overlay.show{display:flex;animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:820px;
  overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.7);
  animation:modalIn 0.3s ease;
}
@keyframes modalIn{from{transform:scale(0.95);}to{transform:scale(1);}}
.modal-video{width:100%;aspect-ratio:16/9;background:#000;}
.modal-video iframe,.modal-video video{width:100%;height:100%;border:none;}
.modal-info{padding:1.5rem;}
.modal-info h2{
  font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:0.5rem;
}
.modal-info p{color:var(--muted);font-size:0.88rem;line-height:1.6;}
.modal-meta{
  display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;
}
.modal-meta span{
  display:flex;align-items:center;gap:0.4rem;
  font-size:0.82rem;color:var(--muted);
  background:var(--input-bg);padding:0.3rem 0.75rem;border-radius:8px;
}
.modal-close-btn{
  position:absolute;top:0.75rem;right:0.75rem;
  background:rgba(0,0,0,0.5);border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:310;
}

/* Expired overlay */
.expired-overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.95);
  align-items:center;justify-content:center;
  flex-direction:column;text-align:center;padding:2rem;
}
.expired-overlay.show{display:flex;animation:fadeIn 0.5s ease;}
.expired-overlay h2{
  font-family:'Sora',sans-serif;font-size:2rem;font-weight:800;
  margin:1rem 0 0.5rem;
}
.expired-overlay p{color:var(--muted);font-size:1rem;margin-bottom:2rem;}
.btn-renew{
  padding:0.9rem 2.5rem;
  background:linear-gradient(135deg,var(--green),var(--green-light));
  border:none;border-radius:12px;color:#fff;
  font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
}
.btn-renew:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(22,163,74,0.4);}

@media(max-width:768px){
  nav{padding:0.6rem 1rem;}
  .user-chip{display:none;}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
  .controls{flex-direction:column;}
  .search-wrap{min-width:100%;}
  .extend-banner{bottom:1rem;right:1rem;left:1rem;max-width:none;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo"><div class="logo-icon">📚</div>ElimuPay</div>

  <div class="timer-pill" id="timerPill" title="Time remaining in your session">
    <div class="timer-dot"></div>
    <span id="timerDisplay">--:--</span>
  </div>

  <div class="nav-right">
    <div class="user-chip">👤 <span id="navName">...</span></div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</nav>

<!-- EXTEND SESSION BANNER -->
<div class="extend-banner" id="extendBanner">
  <h4>⏰ Session Expiring Soon!</h4>
  <p>You have less than 5 minutes left. Extend now to keep watching without interruption.</p>
  <div class="extend-banner-btns">
    <button class="btn-extend primary" onclick="extendSession()">Extend — KES 10</button>
    <button class="btn-extend secondary" onclick="document.getElementById('extendBanner').classList.remove('show')">Dismiss</button>
  </div>
</div>

<!-- EXPIRED OVERLAY -->
<div class="expired-overlay" id="expiredOverlay">
  <div style="font-size:4rem">⏱️</div>
  <h2>Session Expired</h2>
  <p>Your 30-minute access window has ended.<br>Pay KES 10 to start a new session.</p>
  <button class="btn-renew" onclick="window.location.href='pay.html'">Renew Access — KES 10</button>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="videoModal">
  <button class="modal-close-btn" onclick="closeModal()">✕</button>
  <div class="modal">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-info">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div class="modal-meta" id="modalMeta"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="container">
    <div class="page-header">
      <h1>📚 Video <span>Library</span></h1>
      <div class="video-count" id="videoCount">Loading...</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <span>🔍</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Search videos..." oninput="filterVideos()"/>
      </div>
      <select class="filter-select" id="gradeFilter" onchange="filterVideos()">
        <option value="">All Grades</option>
        <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
        <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
        <option>Form 1</option><option>Form 2</option><option>Form 3</option><option>Form 4</option>
      </select>
      <select class="filter-select" id="sortFilter" onchange="filterVideos()">
        <option value="newest">Newest First</option>
        <option value="popular">Most Viewed</option>
        <option value="az">A → Z</option>
      </select>
    </div>

    <!-- Subject Tabs -->
    <div class="subject-tabs">
      <button class="subject-tab active" data-subject="" onclick="setSubject(this,'')">📚 All</button>
      <button class="subject-tab" data-subject="Mathematics" onclick="setSubject(this,'Mathematics')">📐 Mathematics</button>
      <button class="subject-tab" data-subject="Science" onclick="setSubject(this,'Science')">🔬 Science</button>
      <button class="subject-tab" data-subject="English" onclick="setSubject(this,'English')">📖 English</button>
      <button class="subject-tab" data-subject="Kiswahili" onclick="setSubject(this,'Kiswahili')">🗣 Kiswahili</button>
      <button class="subject-tab" data-subject="History" onclick="setSubject(this,'History')">📜 History</button>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid">
      <!-- Skeletons -->
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</main>

<script>
const API=window.location.origin;
let allVideos=[];
let currentSubject='';
let sessionExpiry=null;
let timerInterval=null;
let extendShown=false;
let currentVideoId=null;

const SUBJECT_COLORS={
  'Mathematics':'badge-math',
  'Science':'badge-science',
  'English':'badge-english',
  'History':'badge-history',
  'Kiswahili':'badge-kiswahili',
};

function getToken(){
  const t=localStorage.getItem('token');
  if(!t) window.location.href='index.html';
  return t;
}
function logout(){
  localStorage.clear();window.location.href='index.html';
}
function toggleTheme(){
  const h=document.documentElement;
  const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.querySelector('.theme-btn').textContent=d?'🌙':'☀️';
}

// ─── TIMER ───
function startTimer(expiresAt){
  sessionExpiry=new Date(expiresAt).getTime();
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  updateTimer();
}
function updateTimer(){
  const now=Date.now();
  const diff=sessionExpiry-now;
  if(diff<=0){
    clearInterval(timerInterval);
    document.getElementById('expiredOverlay').classList.add('show');
    return;
  }
  const mins=Math.floor(diff/60000);
  const secs=Math.floor((diff%60000)/1000);
  const display=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('timerDisplay').textContent=display;

  const pill=document.getElementById('timerPill');
  if(diff<300000 && diff>=60000){// < 5 min
    pill.className='timer-pill warning';
    if(!extendShown){extendShown=true;document.getElementById('extendBanner').classList.add('show');}
  } else if(diff<60000){// < 1 min
    pill.className='timer-pill critical';
  } else {
    pill.className='timer-pill';
  }
}

// ─── VIDEOS ───
async function loadVideos(){
  const token=getToken();
  try{
    const r=await fetch(`${API}/api/videos`,{headers:{Authorization:`Bearer ${token}`}});
    if(r.status===403){window.location.href='pay.html';return;}
    if(!r.ok){throw new Error('Failed');}
    const d=await r.json();
    allVideos=d.videos||[];
    if(d.expiresAt) startTimer(d.expiresAt);
    renderVideos(allVideos);
  }catch(e){
    document.getElementById('videoGrid').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Failed to load videos</h3>
        <p>Please check your connection and try again.</p>
      </div>`;
  }
}

function setSubject(btn,subject){
  document.querySelectorAll('.subject-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentSubject=subject;
  filterVideos();
}

function filterVideos(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const grade=document.getElementById('gradeFilter').value;
  const sort=document.getElementById('sortFilter').value;

  let filtered=allVideos.filter(v=>{
    const matchSubject=!currentSubject||v.subject===currentSubject;
    const matchSearch=!q||v.title.toLowerCase().includes(q)||(v.description||'').toLowerCase().includes(q);
    const matchGrade=!grade||v.grade===grade;
    return matchSubject&&matchSearch&&matchGrade;
  });

  if(sort==='popular') filtered.sort((a,b)=>(b.views||0)-(a.views||0));
  else if(sort==='az') filtered.sort((a,b)=>a.title.localeCompare(b.title));

  renderVideos(filtered);
}

function formatDuration(s){
  if(!s) return '';
  const m=Math.floor(s/60),sec=s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function getSubjectEmoji(s){
  const map={Mathematics:'📐',Science:'🔬',English:'📖',Kiswahili:'🗣',History:'📜'};
  return map[s]||'📚';
}

function renderVideos(videos){
  const grid=document.getElementById('videoGrid');
  document.getElementById('videoCount').textContent=`${videos.length} video${videos.length!==1?'s':''}`;

  if(!videos.length){
    grid.innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No videos found</h3>
        <p>Try a different subject or search term.</p>
      </div>`;
    return;
  }

  grid.innerHTML=videos.map((v,i)=>{
    const badgeClass=SUBJECT_COLORS[v.subject]||'badge-default';
    const emoji=getSubjectEmoji(v.subject);
    const thumb=v.thumbnail?
      `<img src="${v.thumbnail}" alt="${v.title}" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>${emoji}</div>'">`
      :`<div class="thumb-placeholder">${emoji}</div>`;
    const dur=formatDuration(v.duration);
    return `
    <div class="video-card" onclick="openVideo(${JSON.stringify(v).replace(/"/g,'&quot;')})"
         style="animation-delay:${i*0.05}s">
      <div class="thumbnail">
        ${thumb}
        <div class="play-overlay"><div class="play-btn">▶</div></div>
        ${v.subject?`<div class="subject-badge ${badgeClass}">${v.subject}</div>`:''}
        ${dur?`<div class="duration-badge">${dur}</div>`:''}
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          ${v.grade?`<span>🎓 ${v.grade}</span>`:''}
          <span class="views-count">👁 ${(v.views||0).toLocaleString()} views</span>
        </div>
        ${v.description?`<div class="card-desc">${v.description}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openVideo(v){
  currentVideoId=v.id;
  document.getElementById('modalTitle').textContent=v.title;
  document.getElementById('modalDesc').textContent=v.description||'';

  const meta=[];
  if(v.subject) meta.push(`<span>${getSubjectEmoji(v.subject)} ${v.subject}</span>`);
  if(v.grade) meta.push(`<span>🎓 ${v.grade}</span>`);
  if(v.duration) meta.push(`<span>⏱ ${formatDuration(v.duration)}</span>`);
  meta.push(`<span>👁 ${(v.views||0).toLocaleString()} views</span>`);
  document.getElementById('modalMeta').innerHTML=meta.join('');

  // Detect if YouTube or direct video
  const isYT=/youtube\.com|youtu\.be/.test(v.url);
  if(isYT){
    const id=v.url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
    document.getElementById('modalVideo').innerHTML=
      `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay;fullscreen" allowfullscreen></iframe>`;
  } else {
    document.getElementById('modalVideo').innerHTML=
      `<video src="${v.url}" controls autoplay style="background:#000"></video>`;
  }

  document.getElementById('videoModal').classList.add('show');
  document.body.style.overflow='hidden';

  // Record view
  const token=localStorage.getItem('token');
  if(token) fetch(`${API}/api/videos/${v.id}/view`,{method:'POST',headers:{Authorization:`Bearer ${token}`}}).catch(()=>{});
}

function closeModal(){
  document.getElementById('videoModal').classList.remove('show');
  document.getElementById('modalVideo').innerHTML='';
  document.body.style.overflow='';
}

async function extendSession(){
  document.getElementById('extendBanner').classList.remove('show');
  window.location.href='pay.html';
}

// Click outside modal
document.getElementById('videoModal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

// Init
(async()=>{
  const token=localStorage.getItem('token');
  if(!token){window.location.href='index.html';return;}
  document.getElementById('navName').textContent=localStorage.getItem('name')||'User';
  await loadVideos();
})();
</script>
</body>
</html>
