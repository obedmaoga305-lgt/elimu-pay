<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElimuPay — Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a5c38; --green-light: #e8f5ee;
      --gold: #c8922a; --text: #1a1a1a;
      --muted: #6b7280; --border: #e5e7eb; --white: #fff;
      --danger: #dc2626;
    }
    body { font-family:'DM Sans',sans-serif; background:#f7f6f2; min-height:100vh; }

    /* EXPIRED OVERLAY */
    #expired-overlay {
      position:fixed; inset:0; z-index:999;
      background:rgba(0,0,0,0.85);
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:20px; text-align:center; padding:2rem;
    }
    #expired-overlay.show { display:flex; }
    #expired-overlay h2 { font-family:'Playfair Display',serif; color:#fff; font-size:2rem; }
    #expired-overlay p { color:rgba(255,255,255,0.7); max-width:360px; line-height:1.6; }
    .renew-btn {
      padding:14px 32px; background:var(--gold); color:#fff;
      border:none; border-radius:12px; font-family:'DM Sans',sans-serif;
      font-size:1rem; font-weight:600; cursor:pointer;
      transition:background 0.2s;
    }
    .renew-btn:hover { background:#a87620; }

    /* HEADER */
    header {
      background:var(--green);
      padding:0 2rem;
      display:flex; align-items:center; justify-content:space-between;
      height:60px;
      position:sticky; top:0; z-index:100;
    }
    .brand { font-family:'Playfair Display',serif; color:#fff; font-size:1.2rem; display:flex; align-items:center; gap:8px; }
    .brand span { background:var(--gold); border-radius:6px; padding:2px 8px; font-size:1rem; }

    /* TIMER */
    .timer-wrap {
      display:flex; align-items:center; gap:10px;
    }
    .timer-label { color:rgba(255,255,255,0.7); font-size:0.8rem; }
    .timer {
      display:flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.12);
      border-radius:100px; padding:6px 14px;
    }
    .timer-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .timer-time { color:#fff; font-size:0.9rem; font-weight:600; font-variant-numeric:tabular-nums; }
    .timer.warning .timer-dot { background:#fbbf24; }
    .timer.danger .timer-dot { background:#f87171; animation:pulse 0.5s ease-in-out infinite; }
    .timer.danger .timer-time { color:#fca5a5; }

    .user-info {
      display:flex; align-items:center; gap:8px;
      color:rgba(255,255,255,0.8); font-size:0.85rem;
    }
    .avatar {
      width:32px; height:32px; border-radius:50%;
      background:var(--gold); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:600; font-size:0.8rem;
    }

    /* LAYOUT */
    .page { max-width:1100px; margin:0 auto; padding:2rem; }

    .page-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--text); margin-bottom:0.3rem; }
    .page-sub { color:var(--muted); margin-bottom:2rem; font-size:0.9rem; }

    /* CATEGORIES */
    .categories {
      display:flex; gap:10px; flex-wrap:wrap; margin-bottom:2rem;
    }
    .cat-btn {
      padding:7px 16px; border-radius:100px;
      border:1.5px solid var(--border);
      background:var(--white); color:var(--muted);
      cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:0.85rem; transition:all 0.15s;
    }
    .cat-btn:hover, .cat-btn.active {
      background:var(--green); color:#fff; border-color:var(--green);
    }

    /* VIDEO GRID */
    .video-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap:20px;
    }

    .video-card {
      background:var(--white); border-radius:16px;
      overflow:hidden; cursor:pointer;
      border:1px solid var(--border);
      transition:transform 0.2s, box-shadow 0.2s;
    }
    .video-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.1); }

    .video-thumb {
      width:100%; aspect-ratio:16/9;
      background:var(--green);
      display:flex; align-items:center; justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .video-thumb iframe {
      position:absolute; inset:0; width:100%; height:100%;
      border:none; pointer-events:none;
    }
    .play-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.3);
      transition:background 0.2s;
    }
    .video-card:hover .play-overlay { background:rgba(0,0,0,0.1); }
    .play-btn {
      width:50px; height:50px; border-radius:50%;
      background:rgba(255,255,255,0.9);
      display:flex; align-items:center; justify-content:center;
      font-size:20px;
    }

    .video-info { padding:14px 16px; }
    .video-subject {
      display:inline-block;
      padding:3px 10px; border-radius:100px;
      background:var(--green-light); color:var(--green);
      font-size:0.75rem; font-weight:600; margin-bottom:8px;
    }
    .video-title { font-weight:600; font-size:0.95rem; color:var(--text); margin-bottom:4px; line-height:1.4; }
    .video-meta { color:var(--muted); font-size:0.8rem; display:flex; gap:12px; }

    /* PLAYER MODAL */
    #player-modal {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.9);
      display:none; align-items:center; justify-content:center;
      padding:1rem;
    }
    #player-modal.show { display:flex; }
    .modal-inner { width:100%; max-width:900px; }
    .modal-top {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:12px;
    }
    .modal-title { color:#fff; font-size:1rem; font-weight:600; }
    .close-btn {
      background:rgba(255,255,255,0.1); border:none; color:#fff;
      width:36px; height:36px; border-radius:50%;
      cursor:pointer; font-size:1.2rem; display:flex;
      align-items:center; justify-content:center;
    }
    .close-btn:hover { background:rgba(255,255,255,0.2); }
    .video-container {
      border-radius:12px; overflow:hidden;
      aspect-ratio:16/9; background:#000;
    }
    .video-container iframe { width:100%; height:100%; border:none; }

    .logout-btn {
      background:none; border:none; color:rgba(255,255,255,0.6);
      font-size:0.8rem; cursor:pointer; padding:4px 8px;
      border-radius:6px; transition:color 0.2s;
    }
    .logout-btn:hover { color:#fff; }
  </style>
</head>
<body>

<!-- EXPIRED OVERLAY -->
<div id="expired-overlay">
  <div style="font-size:60px">⏰</div>
  <h2>Your 30 Minutes Are Up!</h2>
  <p>Your session has expired. Pay KSh 10 to get another 30 minutes of unlimited access.</p>
  <button class="renew-btn" onclick="window.location.href='pay.html'">Renew for KSh 10</button>
</div>

<!-- VIDEO PLAYER MODAL -->
<div id="player-modal">
  <div class="modal-inner">
    <div class="modal-top">
      <span class="modal-title" id="modal-title">Video Title</span>
      <button class="close-btn" onclick="closePlayer()">✕</button>
    </div>
    <div class="video-container">
      <iframe id="video-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="brand"><span>📚</span> ElimuPay</div>
  <div class="timer-wrap">
    <span class="timer-label">Access expires in</span>
    <div class="timer" id="timer">
      <span class="timer-dot"></span>
      <span class="timer-time" id="timer-display">30:00</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="user-info">
      <div class="avatar" id="user-avatar">?</div>
      <span id="username-display">User</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<!-- MAIN CONTENT -->
<div class="page">
  <h1 class="page-title">Educational Videos</h1>
  <p class="page-sub">Browse and learn — your session timer is counting above.</p>

  <div class="categories">
    <button class="cat-btn active" onclick="filterVideos('all', this)">All Subjects</button>
    <button class="cat-btn" onclick="filterVideos('Mathematics', this)">Mathematics</button>
    <button class="cat-btn" onclick="filterVideos('Science', this)">Science</button>
    <button class="cat-btn" onclick="filterVideos('English', this)">English</button>
    <button class="cat-btn" onclick="filterVideos('History', this)">History</button>
    <button class="cat-btn" onclick="filterVideos('Kiswahili', this)">Kiswahili</button>
  </div>

  <div class="video-grid" id="video-grid">
    <!-- Videos injected by JS -->
  </div>
</div>

<script>
  const API = 'https://elimu-pay.onrender.com';

  // Auth check
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username') || 'User';
  if (!token) { window.location.href = 'index.html'; }

  // Set user display
  document.getElementById('username-display').textContent = username;
  document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();

  // === TIMER ===
  let timerInterval = null;

  function startTimer(expiresAt) {
    const timerEl = document.getElementById('timer');
    const displayEl = document.getElementById('timer-display');

    timerInterval = setInterval(() => {
      const remaining = Math.max(0, expiresAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      displayEl.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

      timerEl.classList.remove('warning','danger');
      if (remaining < 120000) timerEl.classList.add('danger');
      else if (remaining < 300000) timerEl.classList.add('warning');

      if (remaining <= 0) {
        clearInterval(timerInterval);
        closePlayer();
        document.getElementById('expired-overlay').classList.add('show');
      }
    }, 1000);
  }

  async function checkAccess() {
    try {
      const res = await fetch(`${API}/api/check-access`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok || !data.hasAccess) {
        window.location.href = 'pay.html';
        return;
      }
      startTimer(new Date(data.expiresAt).getTime());
    } catch {
      window.location.href = 'pay.html';
    }
  }
  checkAccess();

  // === VIDEO DATA ===
  // Replace YouTube IDs with your actual video IDs
  const videos = [
    { id: 1, title: 'Introduction to Algebra', subject: 'Mathematics', duration: '14:32', tutor: 'Mr. Kamau', youtubeId: 'NybHckSEQBI', thumb_color: '#1a5c38' },
    { id: 2, title: 'Human Body Systems Explained', subject: 'Science', duration: '18:10', tutor: 'Mrs. Wanjiru', youtubeId: 'Ae4MadKPJhg', thumb_color: '#7c3aed' },
    { id: 3, title: 'Essay Writing Masterclass', subject: 'English', duration: '22:05', tutor: 'Mr. Odhiambo', youtubeId: 'dQw4w9WgXcQ', thumb_color: '#0369a1' },
    { id: 4, title: 'Kenya History: Pre-Colonial Era', subject: 'History', duration: '16:45', tutor: 'Mrs. Atieno', youtubeId: 'dQw4w9WgXcQ', thumb_color: '#b45309' },
    { id: 5, title: 'Pythagoras Theorem in Practice', subject: 'Mathematics', duration: '12:20', tutor: 'Mr. Mwangi', youtubeId: 'NybHckSEQBI', thumb_color: '#1a5c38' },
    { id: 6, title: 'Photosynthesis & Plant Life', subject: 'Science', duration: '19:55', tutor: 'Mrs. Chebet', youtubeId: 'Ae4MadKPJhg', thumb_color: '#15803d' },
    { id: 7, title: 'Kiswahili Sarufi — Nomino', subject: 'Kiswahili', duration: '11:30', tutor: 'Mwalimu Hassan', youtubeId: 'dQw4w9WgXcQ', thumb_color: '#be123c' },
    { id: 8, title: 'Reading Comprehension Tips', subject: 'English', duration: '15:10', tutor: 'Mrs. Achieng', youtubeId: 'dQw4w9WgXcQ', thumb_color: '#0369a1' },
    { id: 9, title: 'Quadratic Equations Step by Step', subject: 'Mathematics', duration: '24:00', tutor: 'Mr. Kamau', youtubeId: 'NybHckSEQBI', thumb_color: '#1a5c38' },
  ];

  let currentFilter = 'all';

  function filterVideos(subject, btn) {
    currentFilter = subject;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderVideos();
  }

  function renderVideos() {
    const filtered = currentFilter === 'all' ? videos : videos.filter(v => v.subject === currentFilter);
    const grid = document.getElementById('video-grid');
    grid.innerHTML = filtered.map(v => `
      <div class="video-card" onclick="playVideo('${v.youtubeId}','${v.title.replace(/'/g, "\'")}')">
        <div class="video-thumb" style="background:${v.thumb_color}">
          <div class="play-overlay">
            <div class="play-btn">▶</div>
          </div>
        </div>
        <div class="video-info">
          <span class="video-subject">${v.subject}</span>
          <div class="video-title">${v.title}</div>
          <div class="video-meta">
            <span>👤 ${v.tutor}</span>
            <span>⏱ ${v.duration}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function playVideo(youtubeId, title) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('video-iframe').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
    document.getElementById('player-modal').classList.add('show');
  }

  function closePlayer() {
    document.getElementById('player-modal').classList.remove('show');
    document.getElementById('video-iframe').src = '';
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  // Close modal on backdrop click
  document.getElementById('player-modal').addEventListener('click', function(e) {
    if (e.target === this) closePlayer();
  });

  renderVideos();
</script>
</body>
</html>
